<div class="panel-layout">
  <!-- Sidebar -->
  <aside class="panel-sidebar" [class.open]="sidebarOpen">
    <div class="sidebar-header">
      <div class="brand">
        <div class="logo">IRIFAMS</div>
        <div class="sub">Farmer Panel</div>
      </div>
    </div>

    <a class="slink" routerLink="/farmer/dashboard" routerLinkActive="active" (click)="closeSidebar()">
      <span class="slink__left">
        <i data-lucide="layout-dashboard"></i>
        <span>Dashboard</span>
      </span>
    </a>

    <a class="slink" routerLink="/farmer/profile" routerLinkActive="active" (click)="closeSidebar()">
      <span class="slink__left">
        <i data-lucide="user"></i>
        <span>Profile</span>
      </span>
    </a>

    <a class="slink" routerLink="/farmer/farms-plots" routerLinkActive="active" (click)="closeSidebar()">
      <span class="slink__left">
        <i data-lucide="sprout"></i>
        <span>Farms &amp; Plots</span>
      </span>
    </a>

    <a class="slink" routerLink="/farmer/requests" routerLinkActive="active" (click)="closeSidebar()">
      <span class="slink__left">
        <i data-lucide="file-text"></i>
        <span>Requests</span>
      </span>
    </a>

    <a class="slink" routerLink="/farmer/payments" routerLinkActive="active" (click)="closeSidebar()">
      <span class="slink__left">
        <i data-lucide="credit-card"></i>
        <span>Payments</span>
      </span>
    </a>

    <a class="slink" routerLink="/farmer/notifications" routerLinkActive="active" (click)="closeSidebar()">
      <span class="slink__left">
        <i data-lucide="bell"></i>
        <span>Notifications</span>
      </span>
    </a>
   
    <a class="slink" routerLink="/farmer/setting" routerLinkActive="active" (click)="closeSidebar()">
      <span class="slink__left">
        <i data-lucide="settings"></i>
        <span>Settings</span>
      </span>
    </a>

    <div class="sidebar-foot">
      <button class="side-btn" type="button" (click)="logout()">
        <i data-lucide="log-out"></i>
        <span>Back to public</span>
      </button>
    </div>
  </aside>

  <!-- Main container -->
  <div class="main-container">
    <!-- Mobile menu button -->
    <button class="menu-btn" type="button" (click)="toggleSidebar()" aria-label="Open menu">
      <i data-lucide="menu"></i>
    </button>

    <!-- Sticky Header -->
    <header class="header">
  <div class="header-left">
    <div class="who">
      <span class="who__name">Farmer Name</span>
      <span class="who__meta">Farmer Account</span>
    </div>
  </div>

  <div class="header-right">
    <!-- Notifications -->
    <div class="dropdown">
      <button class="icon-btn2" type="button" (click)="toggleNotif($event)" aria-label="Notifications">
        <i data-lucide="bell"></i>
        <span class="badge-dot">3</span>
      </button>

      <div class="dropdown__menu show" *ngIf="notifOpen" (click)="stop($event)">
        <div class="dropdown__title">Notifications</div>

        <a routerLink="/farmer/notifications" (click)="closeDropdowns()">
          <i data-lucide="dot"></i>
          Irrigation scheduled
        </a>

        <a routerLink="/farmer/notifications" (click)="closeDropdowns()">
          <i data-lucide="dot"></i>
          Payment confirmed
        </a>

        <a routerLink="/farmer/notifications" (click)="closeDropdowns()">
          <i data-lucide="dot"></i>
          Request approved
        </a>

        <hr class="dd-sep" />
        <a routerLink="/farmer/notifications" (click)="closeDropdowns()">
          <i data-lucide="external-link"></i>
          View all
        </a>
      </div>
    </div>

    <!-- Profile -->
    <div class="dropdown">
      <button class="profile-btn" type="button" (click)="toggleProfile($event)">
        <span class="avatar">F</span>
        <span class="caret"><i data-lucide="chevron-down"></i></span>
      </button>

      <div class="dropdown__menu show" *ngIf="profileOpen" (click)="stop($event)">
        <div class="dropdown__title">Account</div>

        <a routerLink="/farmer/profile" (click)="closeDropdowns()">
          <i data-lucide="user"></i>
          Profile
        </a>

        <a routerLink="/farmer/settings" (click)="closeDropdowns()">
          <i data-lucide="settings"></i>
          Settings
        </a>

        <!-- ✅ FIX: absolute path -->
        <a routerLink="/farmer/help" (click)="closeDropdowns()">
          <i data-lucide="help-circle"></i>
          Help
        </a>

        <hr class="dd-sep" />

        <a class="danger" (click)="logout()" style="cursor:pointer;">
          <i data-lucide="log-out"></i>
          Logout
        </a>
      </div>
    </div>
  </div>
</header>


    <!-- Content -->
    <section class="panel-content">
      <router-outlet></router-outlet>
    </section>

    <!-- Footer -->
    <footer class="panel-footer">
      <span>© 2026 IRIFAMS • Farmer Panel</span>
      <span class="muted">UI template only</span>
    </footer>
  </div>

  <!-- Backdrop for mobile -->
  <button
    class="backdrop"
    type="button"
    *ngIf="sidebarOpen"
    (click)="closeSidebar()"
    aria-label="Close sidebar">
  </button>
</div>
