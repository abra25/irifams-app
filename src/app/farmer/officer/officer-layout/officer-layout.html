<div class="panel-layout">
  <!-- Sidebar -->
  <aside class="panel-sidebar" [class.open]="sidebarOpen">
    <div class="sidebar-header">
      <div class="brand">
        <div class="logo">IRIFAMS</div>
        <div class="sub">Government Officer</div>
      </div>
    </div>

    <a routerLink="o-dash" routerLinkActive="active" (click)="closeSidebar()">
      <span class="icon">📊</span> Dashboard
    </a>

    <a routerLink="farms-plots" routerLinkActive="active" (click)="closeSidebar()">
      <span class="icon">🌾</span> Farms & Plots
    </a>

    <a routerLink="" routerLinkActive="active" (click)="closeSidebar()">
      <span class="icon">🧪</span> Inputs Distribution
    </a>

    <a routerLink="" routerLinkActive="active" (click)="closeSidebar()">
      <span class="icon">✅</span> Approvals
    </a>

    <a routerLink="" routerLinkActive="active" (click)="closeSidebar()">
      <span class="icon">💳</span> Payments Tracking
    </a>

    <a routerLink="" routerLinkActive="active" (click)="closeSidebar()">
      <span class="icon">📄</span> Reports
    </a>

    <div class="sidebar-divider"></div>

    <a routerLink="/home" (click)="closeSidebar()">
      <span class="icon">🏠</span> Public Home
    </a>
  </aside>

  <!-- Main container -->
  <div class="main-container">
    <button class="menu-btn" type="button" (click)="toggleSidebar()">☰</button>

    <header class="header">
      <div class="header-left">
        <h3 class="page-title">IRIFAMS</h3>
        <span class="tag">Officer</span>
      </div>

      <div class="header-right">
        <div class="user-menu">
          <div class="user-info">
            <span class="user-name">—</span>
            <span class="user-role">Government Officer</span>
          </div>

          <button class="logout-btn" type="button" (click)="logout()">Logout</button>
        </div>
      </div>
    </header>

    <section class="panel-content">
      <router-outlet></router-outlet>
    </section>
  </div>

  <button
    class="backdrop"
    type="button"
    *ngIf="sidebarOpen"
    (click)="closeSidebar()"
    aria-label="Close sidebar">
  </button>
</div>
