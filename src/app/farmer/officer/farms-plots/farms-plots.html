<div class="page-head">
  <div>
    <h2>Farms & Plots Registration</h2>
    <p class="small">Register irrigated rice farms and plots (UI only).</p>
  </div>
</div>

<div class="grid-2">
  <div class="card box">
    <h3>Register Farm</h3>

    <label class="small">Farm Name</label>
    <input class="input" placeholder="e.g. Mbarali Rice Farm" />

    <label class="small">Owner / Farmer ID</label>
    <input class="input" placeholder="Farmer identifier" />

    <label class="small">District / Ward</label>
    <input class="input" placeholder="Location" />

    <button class="btn btn-primary" type="button">Save Farm</button>
    <div class="small hint">No submission yet — backend later.</div>
  </div>

  <div class="card box">
    <h3>Register Plot</h3>

    <label class="small">Farm</label>
    <input class="input" placeholder="Select farm later" />

    <label class="small">Plot Code</label>
    <input class="input" placeholder="Plot identifier" />

    <label class="small">Area (Hectares)</label>
    <input class="input" placeholder="e.g. 2.5" />

    <label class="small">Ownership / Lease</label>
    <input class="input" placeholder="Owned / Leased" />

    <button class="btn btn-primary" type="button">Save Plot</button>
    <div class="small hint">UI template only.</div>
  </div>
</div>

<div class="card box table-box">
  <div class="table-head">
    <h3>Registered Records</h3>
    <div class="small">Empty table placeholder (no dummy data).</div>
  </div>

  <div class="table-placeholder">
    <div class="small">No records to display.</div>
  </div>
</div>
