<div class="login-page">

  <!-- Background Overlay -->
  <div class="bg-overlay"></div>

  <!-- LOGIN CARD -->
  <div class="login-card">

    <!-- Logo -->
    <div class="logo-wrap">
      <div class="brand">
        <img
        src="img/logo.png"
        alt="IRIFAMS Logo"
        class="logo-img"
      />

      <h1>IRIFAMS</h1>
      </div>
      <p>Please sign in to your account</p>
    </div>

    <!-- FORM -->
    <form class="login-form" (ngSubmit)="onLogin()" #loginForm="ngForm">

      <!-- Username -->
      <div class="form-group">
        <div class="input-wrap">
          <i data-lucide="user"></i>

          <input
            type="text"
            id="username"
            name="username"
            [(ngModel)]="loginData.username"
            placeholder="Username"
            required
          />
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <div class="input-wrap">
          <i data-lucide="lock"></i>

          <input
            [type]="showPassword ? 'text' : 'password'"
            id="password"
            name="password"
            [(ngModel)]="loginData.password"
            placeholder="Password"
            required
          />

          <button
            type="button"
            class="toggle-password"
            (click)="togglePassword()"
          >
            <i [attr.data-lucide]="showPassword ? 'eye-off' : 'eye'"></i>
          </button>
        </div>
      </div>

      <!-- Role -->
      <div class="form-group">
        <label>Select Role</label>

        <div class="select-wrap">
          <select
            id="role"
            name="role"
            [(ngModel)]="loginData.role"
            required
          >
            <option value="" disabled>
              -- Choose Role --
            </option>

            <option value="admin">Admin</option>
            <option value="block-supervisor">
              Block Supervisor
            </option>
            <option value="farmer">Farmer</option>
          </select>
        </div>
      </div>

      <!-- Login Button -->
      <button
        type="submit"
        class="login-btn"
        [disabled]="loading"
      >
        <span *ngIf="!loading">Login</span>
        <span *ngIf="loading">Signing in...</span>
      </button>

      <!-- Links -->
      <div class="bottom-links">
        <a href="javascript:void(0)" class="forgot-link">
          Forgot password?
        </a>

        <p class="register-text">
          Not registered?

          <a routerLink="/register">
            Create Account
          </a>
        </p>
      </div>
    </form>
  </div>

  <!-- Footer -->
  <footer class="login-footer">
    © 2026 IRIFAMS. All rights reserved.
  </footer>
</div>
