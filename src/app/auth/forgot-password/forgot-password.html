<div class="forgot-page">

  <div class="bg-overlay"></div>

  <div class="forgot-card">

    <div class="logo-wrap">

      <img
        src="img/logo.png"
        alt="IRIFAMS"
        class="logo-img">

      <h1>Forgot Password</h1>

      <p *ngIf="!submitted">
        Enter your username or email address
      </p>

    </div>

    <!-- FORM -->

    <form
      *ngIf="!submitted"
      (ngSubmit)="onSubmit()"
      class="forgot-form">

      <div class="form-group">

        <label>Username or Email</label>

        <div class="input-wrap">

          <i class="fas fa-user"></i>

          <input
            type="text"
            name="usernameOrEmail"
            [(ngModel)]="formData.usernameOrEmail"
            placeholder="Enter username or email"
            required>

        </div>

      </div>

      <button
        class="submit-btn"
        [disabled]="loading">

        <span *ngIf="!loading">
          Send Reset Link
        </span>

        <span *ngIf="loading">
          Sending...
        </span>

      </button>

    </form>


    <!-- SUCCESS -->

    <div
      class="success-box"
      *ngIf="submitted">

      <div class="success-icon">
        <i class="fas fa-check-circle"></i>
      </div>

      <h3>Request Submitted</h3>

      <p>
        If your account exists, password reset instructions
        have been sent to your registered email address.
      </p>

      <div class="info-note">

        <i class="fas fa-info-circle"></i>

        <span>
          For account assistance, contact your
          Block Supervisor or System Administrator.
        </span>

      </div>

    </div>

    <div class="back-login">

      <a routerLink="/login">

        <i class="fas fa-arrow-left"></i>
        Back to Login

      </a>

    </div>

  </div>

</div>
