<div class="inputs-page">

    <div class="page-header">

        <div>
            <h2>Farm Inputs Management</h2>
            <p>
                Manage seeds and fertilizers distribution.
            </p>
        </div>

        <button class="add-btn"
                (click)="showAddModal=true">

            <i class="fas fa-plus"></i>
            Add Input

        </button>

    </div>


    <!-- SUMMARY -->

    <div class="summary-grid">

        <div class="summary-card">

            <h3>{{inputs.length}}</h3>
            <span>Total Inputs</span>

        </div>

        <div class="summary-card">

            <h3>{{availableCount}}</h3>
            <span>Available Inputs</span>

        </div>

    </div>


    <!-- INPUT CARDS -->

    <div class="inputs-grid">

        <div class="input-card"
             *ngFor="let input of inputs">

            <img [src]="input.image"
                 [alt]="input.name">

            <div class="card-content">

                <span class="category">
                    {{input.category}}
                </span>

                <h3>{{input.name}}</h3>

                <p>

                    Quantity:
                    <strong>

                        {{input.quantity}}
                        {{input.unit}}

                    </strong>

                </p>

                <p>{{input.season}}</p>

                <span class="status-badge"
                      [class.out]="input.status === 'Out of Stock'">

                    {{input.status}}

                </span>

            </div>

            <div class="card-actions">

                <button class="view-btn"
                        (click)="viewInput(input)">

                    <i class="fas fa-eye"></i>

                </button>

                <button class="dist-btn"
                        (click)="distributeInput(input)"
                        [disabled]="input.status==='Out of Stock'">

                    <i class="fas fa-share"></i>

                </button>

            </div>

        </div>

    </div>

</div>

<!-- ADD INPUT MODAL -->

<div class="modal-overlay"
     *ngIf="showAddModal">

  <div class="modal-card">

    <!-- HEADER -->
    <div class="modal-header">

      <h3>Add New Input</h3>

      <button (click)="showAddModal=false">
        <i class="fas fa-times"></i>
      </button>

    </div>

    <!-- BODY -->
    <div class="modal-body">

      <!-- IMAGE PREVIEW -->
      <div class="image-preview">

        <img
          *ngIf="newInput.image"
          [src]="newInput.image"
          alt="Preview">

        <div
          *ngIf="!newInput.image"
          class="image-placeholder">

          <i class="fas fa-image"></i>
          <p>No Image Selected</p>

        </div>

      </div>


      <div class="form-group full-width">

        <label>Image Path</label>

        <input
          type="text"
          placeholder="img/inputs/saro5.jpg"
          [(ngModel)]="newInput.image">

      </div>


      <div class="form-group">

        <label>Input Name</label>

        <input
          type="text"
          [(ngModel)]="newInput.name">

      </div>


      <div class="form-group">

        <label>Category</label>

        <select [(ngModel)]="newInput.category">

          <option value="">
            Select Category
          </option>

          <option value="Seed">
            Seed
          </option>

          <option value="Fertilizer">
            Fertilizer
          </option>

        </select>

      </div>


      <div class="form-group">

        <label>Quantity</label>

        <input
          type="number"
          [(ngModel)]="newInput.quantity">

      </div>


      <div class="form-group">

        <label>Unit</label>

        <input
          type="text"
          [(ngModel)]="newInput.unit">

      </div>


      <div class="form-group full-width">

        <label>Season</label>

        <input
          type="text"
          [(ngModel)]="newInput.season">

      </div>

    </div>


    <!-- FOOTER -->

    <div class="modal-footer">

      <button
        class="cancel-btn"
        (click)="showAddModal=false">

        Cancel

      </button>

      <button
        class="save-btn"
        (click)="addInput()">

        Save Input

      </button>

    </div>

  </div>

</div>
