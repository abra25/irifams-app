<div class="plots-page">

  <div class="page-header">

    <div>
      <h2>Farm Plots Management</h2>
      <p>Manage all registered farm plots.</p>
    </div>

    <button class="add-btn"
            (click)="showAddModal=true">

      <i class="fas fa-plus"></i>
      Register Plot

    </button>

  </div>


  <!-- SUMMARY -->

  <div class="summary-grid">

    <div class="summary-card">

      <h3>{{plots.length}}</h3>
      <span>Total Plots</span>

    </div>

    <div class="summary-card">

      <h3>{{activePlotsCount}}</h3>
      <span>Active Plots</span>

    </div>

  </div>


  <!-- TABLE -->

  <div class="table-card">

    <div class="table-responsive">

      <table>

        <thead>

        <tr>

          <th>Plot No</th>
          <th>Farmer</th>
          <th>Block</th>
          <th>Size (Acres)</th>
          <th>Soil Type</th>
          <th>Status</th>
          <th>Action</th>

        </tr>

        </thead>

        <tbody>

        <tr *ngFor="let plot of plots">

          <td>{{plot.plotNo}}</td>
          <td>{{plot.farmer}}</td>
          <td>{{plot.block}}</td>
          <td>{{plot.size}}</td>
          <td>{{plot.soilType}}</td>

          <td>

            <span class="status"
                  [class.inactive]="plot.status==='Inactive'">

              {{plot.status}}

            </span>

          </td>

          <td>

            <div class="actions">

              <button class="view-btn"
                      (click)="viewPlot(plot)">

                <i class="fas fa-eye"></i>

              </button>

              <button class="edit-btn"
                      (click)="editPlot(plot)">

                <i class="fas fa-edit"></i>

              </button>

              <button class="status-btn"
                      (click)="toggleStatus(plot)">

                <i class="fas fa-power-off"></i>

              </button>

            </div>

          </td>

        </tr>

        </tbody>

      </table>

    </div>

  </div>

</div>

<div class="modal-overlay"
     *ngIf="showAddModal">

  <div class="modal-card">

    <div class="modal-header">

      <h3>Register Farm Plot</h3>

      <button (click)="showAddModal=false">
        <i class="fas fa-times"></i>
      </button>

    </div>

    <div class="modal-body">

      <div class="form-group">

        <label>Plot Number</label>

        <input [(ngModel)]="newPlot.plotNo">

      </div>

      <div class="form-group">

        <label>Farmer</label>

        <select [(ngModel)]="newPlot.farmer">

          <option *ngFor="let farmer of farmers">
            {{farmer}}
          </option>

        </select>

      </div>

      <div class="form-group">

        <label>Block</label>

        <input [(ngModel)]="newPlot.block">

      </div>

      <div class="form-group">

        <label>Size (Acres)</label>

        <input type="number"
               [(ngModel)]="newPlot.size">

      </div>

      <div class="form-group">

        <label>Soil Type</label>

        <input [(ngModel)]="newPlot.soilType">

      </div>

    </div>

    <div class="modal-footer">

      <button class="cancel-btn"
              (click)="showAddModal=false">

        Cancel

      </button>

      <button class="save-btn"
              (click)="addPlot()">

        Save Plot

      </button>

    </div>

  </div>

</div>
